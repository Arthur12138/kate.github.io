<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的个人主页</title>
  <meta name="description" content="一个简洁的个人主页，支持随机背景图和随机文案。" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body class="home-page">
  <div id="bg-layer" class="bg-layer"></div>
  <div class="overlay"></div>

  <main class="hero">
    <div class="hero-content">
      <img id="site-logo" class="logo" src="./assets/logo.png" alt="logo" />

      <h1 id="site-title" class="site-title">Your Name</h1>
      <p id="site-subtitle" class="site-subtitle">Code Create Life</p>

      <div class="quote-box">
        <p id="random-quote" class="random-quote">正在加载随机文案...</p>
      </div>

      <nav id="nav-links" class="nav-links"></nav>
      <div id="social-links" class="social-links"></div>
    </div>
  </main>

  <script src="./js/main.js"></script>
</body>
</html>
